services:
  animind-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animind-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    # Uncomment only when STORAGE_MODE=local and your videos are on the VPS disk.
    # volumes:
    #   - /mnt/anime:/mnt/anime:ro

    # Basic container health check.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
